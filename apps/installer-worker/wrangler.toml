# Cloudflare Worker do Portal Instalador da Kaline Offline.
# Worker puramente público: HTML único + bootstraps. Não acessa a Kaline local,
# não recebe tokens/áudio/banco/chaves. Veja README.md para detalhes.
#
# Sem Static Assets de propósito: algumas contas Cloudflare bloqueiam (403) a
# criação de Workers novos que usam o binding de Static Assets. Pra evitar
# essa dependência, o HTML e os bootstraps são todos importados como texto
# puro pelo Worker (src/index.ts) via a regra abaixo.

name = "kaline-installer-worker"
main = "src/index.ts"
compatibility_date = "2026-06-24"

[[rules]]
type = "Text"
globs = ["**/*.html", "**/*.sh", "**/*.ps1", "**/*.bat", "**/*.desktop"]
fallthrough = true
